<!DOCTYPE html>
<html lang='en'>
    <head>
        <meta charset='UTF-8'>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Henny+Penny&display=swap" rel="stylesheet">
        <link rel="shortcut icon" href="favicon/favicon.ico">
        <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
        <link rel="manifest" href="favicon/site.webmanifest">
        <title>All Menus</title>
    </head>
    <body>
        <div class='login-signup'>
            <a href="login.html" class='login-link'>Login</a>
            <a href="signup.html" class='sign-up'>Sign Up</a>
        </div>
        <h1><a href='index.html'><img src="favicon/High-Resolution-Color-Logo-on-Transparent-Background.png" alt="All Menus" class="site-logo"></a></h1>
        <div class="search-form">
            <input type="text" id="query-input" placeholder='Restaurant name, cuisine, or dish (e.g. pizza, sushi, McDonald&apos;s)'>
            <input type="text" id="location-input" placeholder='Enter address, city, or zip code'>
            <select id="radius-select">
                <option value="5">5 miles</option>
                <option value="10">10 miles</option>
                <option value="15" selected>15 miles</option>
                <option value="20">20 miles</option>
                <option value="25">25 miles</option>
                <option value="30">30 miles</option>
                <option value="35">35 miles</option>
                <option value="40">40 miles</option>
                <option value="45">45 miles</option>
                <option value="50">50 miles</option>
            </select>
            <button type="submit">Search Now</button>
            <button type="button" id="use-location-btn">Use my current location</button>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="auth.js"></script>
        <script src="function.js"></script>
    </body>
</html>
